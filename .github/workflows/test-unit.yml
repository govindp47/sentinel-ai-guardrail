name: test-unit

on:
  push:
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test-unit.yml"
  pull_request:
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/test-unit.yml"

jobs:
  test-unit:
    name: pytest (Python 3.12)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      APP_ENV: "development"
      LOG_FORMAT: "console"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.27"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (dev extras)
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: |
          uv run pytest backend/tests/ -x --tb=short -q --no-header
          status=$?
          # Exit code 5 = no tests collected — acceptable on empty scaffold
          if [ $status -eq 5 ]; then
            echo "No tests collected (empty scaffold) — treating as pass."
            exit 0
          fi
          exit $status
