# Alembic configuration file for SentinelAI Guardrail
# sqlalchemy.url is intentionally left as a placeholder —
# it is overridden at runtime by env.py via AppConfig.database_url.

[alembic]
script_location = alembic

# Migration file naming: 20240101_abc123_create_sessions.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

prepend_sys_path = .

# sqlalchemy.url is overridden in env.py — this value is never used directly
sqlalchemy.url = sqlite+aiosqlite:///./sentinel.db

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
