name: lint-backend

on:
  push:
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint-backend.yml"

jobs:
  lint-backend:
    name: Ruff + mypy (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.27"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (dev extras)
        run: uv sync --frozen --extra dev

      - name: Ruff — lint
        run: uv run ruff check backend/src/ --output-format=github

      - name: Ruff — format check
        run: uv run ruff format --check backend/src/

      - name: mypy — strict type check
        run: uv run mypy backend/src/sentinel/ --config-file=pyproject.toml
